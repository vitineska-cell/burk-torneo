<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>BÜRK · Panel del organizador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0B; --panel:#141416; --line:#1F1F23; --line2:#1B1B1F;
  --txt:#EDEDEF; --mut:#8A8A93; --mut2:#6A6A72; --dim:#4A4A52;
  --gold:#B8933A; --silver:#9BA3AE; --ok:#3AB864; --bad:#E74C3C;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Archivo',system-ui,sans-serif;min-height:100vh;padding-bottom:60px}
.wrap{max-width:1060px;margin:0 auto;padding:0 16px}
.hdr{padding:26px 0 10px;display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.hdr-eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.hdr-title{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:clamp(28px,6vw,44px);line-height:.95;color:#fff;text-transform:uppercase}
.hdr-rule{height:3px;width:56px;background:var(--gold);margin-top:10px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.status{font-size:12px;display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border:1px solid var(--line)}
.st-dot{width:8px;height:8px;border-radius:50%}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--txt);font-family:'Archivo';font-weight:600;font-size:13px;padding:10px 16px;cursor:pointer}
.btn:hover{border-color:var(--mut2)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#0A0A0B;font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:15px;letter-spacing:.08em;text-transform:uppercase;padding:11px 20px}
.btn-danger{border-color:#4A2020;color:var(--bad)}
.btn:disabled{opacity:.45;cursor:default}
.tabs{display:flex;gap:4px;padding-top:14px;overflow-x:auto}
.tab{background:none;border:1px solid var(--line);color:var(--mut);font-weight:600;font-size:13px;padding:9px 15px;cursor:pointer;white-space:nowrap}
.tab-on{color:var(--gold);border-color:var(--gold)}
main{padding-top:16px}
.panel{background:var(--panel);border:1px solid var(--line);margin-bottom:14px}
.panel-head{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:17px;letter-spacing:.05em;text-transform:uppercase;padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.panel-head.gold{color:var(--gold)}
.panel-head.silver{color:var(--silver)}
.rest{font-family:'Archivo';font-size:11px;text-transform:none;letter-spacing:0;color:var(--mut2);font-weight:400}
.hint{font-size:11px;color:var(--mut2);padding:10px 14px;line-height:1.5}
.chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chip{min-width:40px;height:40px;padding:0 12px;border:1px solid var(--line);background:var(--panel);color:var(--mut);font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:16px;cursor:pointer}
.chip-on{color:#0A0A0B;background:var(--gold);border-color:var(--gold)}
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);font-weight:600;padding:8px 6px;text-align:center}
.tbl td{padding:8px 6px;text-align:center;border-top:1px solid var(--line2)}
.pos{display:inline-block;padding:2px 8px;color:var(--mut);font-weight:600}
.team-name{font-weight:600;font-size:13px;text-align:left}
.zone{font-size:9px;letter-spacing:.16em;font-weight:700;margin-top:2px;text-align:left}
.num-strong{font-weight:700;color:#fff}
.match{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid var(--line2)}
.pista-chip{display:inline-block;min-width:58px;text-align:center;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold);border:1px solid #3A3020;padding:3px 6px;flex-shrink:0}
.g-chip{font-size:10px;color:var(--mut2);letter-spacing:.08em;flex-shrink:0;min-width:56px}
.m-team{flex:1;font-size:13px;color:#B9B9C0;min-width:0;overflow-wrap:anywhere}
.m-right{text-align:right}
.m-win{color:var(--gold);font-weight:700}
.m-dash{color:var(--dim)}
.score-in{width:46px;height:38px;text-align:center;background:#0A0A0B;border:1px solid #2A2A2F;color:#fff;font-family:'Archivo';font-weight:700;font-size:15px}
.score-in:focus{outline:none;border-color:var(--gold)}
.score-in:disabled{opacity:.35}
.qual-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--line2)}
.seed{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--gold);color:#0A0A0B;font-weight:700;font-size:12px;flex-shrink:0}
.seed-s{background:var(--silver)}
.q-name{flex:1;font-weight:600;font-size:13px;min-width:0;overflow-wrap:anywhere}
.q-meta{font-size:11px;color:var(--mut2);font-weight:400}
.gen-box{padding:14px 0 24px;text-align:center}
.progress-line{height:3px;background:var(--line);margin:0 16px 8px}
.progress-bar{height:100%;background:var(--gold)}
.progress-txt{font-size:11px;color:var(--mut2);margin-bottom:14px}
.bk-cols{display:flex;gap:12px;padding:14px;overflow-x:auto}
.bk-col{flex:1;min-width:230px;display:flex;flex-direction:column;justify-content:space-around;gap:12px}
.bk-round{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut2);font-weight:700}
.bk-match{background:#0F0F11;border:1px solid var(--line)}
.bk-label{font-size:9px;letter-spacing:.16em;color:var(--dim);padding:5px 10px 0;font-weight:700}
.bk-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px}
.bk-row + .bk-row{border-top:1px solid var(--line2)}
.bk-name{font-size:12px;color:#B9B9C0;min-width:0;overflow-wrap:anywhere}
.bk-bye{color:var(--dim);font-style:italic}
.bk-win .bk-name{color:var(--gold);font-weight:700}
.champ-card{border:1px solid;padding:12px;text-align:center;margin-top:4px}
.champ-card .k{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut2);margin-bottom:4px}
.champ-card .n{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:20px}
/* inscripción */
.meta-row{display:flex;gap:12px;flex-wrap:wrap;padding:12px 14px}
.meta-row label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2);margin-bottom:4px}
.meta-row input{background:#0A0A0B;border:1px solid #2A2A2F;color:#fff;font-family:'Archivo';font-size:13px;font-weight:500;padding:9px 12px}
.meta-row input:focus{outline:none;border-color:var(--gold)}
.pair-row{display:flex;align-items:center;gap:8px;padding:7px 14px;border-top:1px solid var(--line2)}
.pair-num{width:26px;text-align:center;font-size:11px;font-weight:700;color:var(--mut2);flex-shrink:0}
.pair-row input{flex:1;min-width:80px;background:#0A0A0B;border:1px solid #2A2A2F;color:#fff;font-family:'Archivo';font-size:13px;font-weight:500;padding:8px 10px}
.pair-row input:focus{outline:none;border-color:var(--gold)}
.pair-del{width:34px;height:34px;border:1px solid #2A2A2F;background:none;color:var(--mut2);cursor:pointer;font-size:14px;flex-shrink:0}
.pair-del:hover{border-color:#4A2020;color:var(--bad)}
.est-tbl{width:100%;border-collapse:collapse;font-size:12px}
.est-tbl th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2);font-weight:600;padding:7px 8px;text-align:left}
.est-tbl td{padding:7px 8px;border-top:1px solid var(--line2);color:#B9B9C0}
.est-tbl tr.est-now td{color:var(--gold);font-weight:700;background:#171308}
/* sorteo */
.raffle-stage{padding:26px 16px;text-align:center;border-top:1px solid var(--line2)}
.raffle-display{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:clamp(26px,6vw,44px);letter-spacing:.02em;text-transform:uppercase;min-height:56px;color:#fff}
.raffle-display.win{color:var(--gold);animation:rglow 2.2s ease-in-out infinite}
@keyframes rglow{0%,100%{text-shadow:0 0 0 rgba(184,147,58,0)}50%{text-shadow:0 0 24px rgba(184,147,58,.55)}}
.raffle-prize-line{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:6px;font-weight:700}
.raffle-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-top:1px solid var(--line2)}
.raffle-name{flex:1;font-weight:700;font-size:14px;min-width:0;overflow-wrap:anywhere}
.raffle-prize{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.raffle-time{font-size:11px;color:var(--dim)}
/* configuración */
.cfg{border:1px solid #3A3020;background:#131007;margin-bottom:14px;padding:16px}
.cfg h3{font-family:'Big Shoulders Display',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);margin-bottom:10px;font-size:16px}
.cfg label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:10px 0 4px}
.cfg input{width:100%;max-width:420px;background:#0A0A0B;border:1px solid #2A2A2F;color:#fff;font-family:'Archivo';font-size:13px;padding:9px 12px}
.cfg input:focus{outline:none;border-color:var(--gold)}
.cfg .row{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cfg .note{font-size:11px;color:var(--mut2);margin-top:10px;max-width:640px;line-height:1.5}
.msg{font-size:12px;padding:2px 0}
.msg.ok{color:var(--ok)}.msg.bad{color:var(--bad)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1A1A1E;border:1px solid var(--line);color:var(--txt);font-size:13px;padding:12px 20px;display:none;z-index:50;max-width:90vw}
.empty{text-align:center;padding:32px 16px;color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <div>
      <div class="hdr-eyebrow">BÜRK · Solo organización</div>
      <h1 class="hdr-title">Panel del organizador</h1>
      <div class="hdr-rule"></div>
    </div>
    <div class="toolbar">
      <span class="status"><span class="st-dot" id="st-dot" style="background:#666"></span><span id="st-txt">…</span></span>
      <button class="btn" id="btn-load">Cargar publicado</button>
      <button class="btn" id="btn-copy">Copiar resumen</button>
      <button class="btn" id="btn-cfg">⚙ Configuración</button>
      <button class="btn-gold btn" id="btn-pub">Guardar y publicar</button>
    </div>
  </header>

  <div class="cfg" id="cfg" style="display:none">
    <h3>Conexión con GitHub</h3>
    <label>Tu usuario de GitHub</label>
    <input id="cfg-owner" placeholder="p. ej. vitineska-cell" autocomplete="off">
    <label>Nombre del repositorio</label>
    <input id="cfg-repo" placeholder="burk-torneo" autocomplete="off">
    <label>Token (fine-grained, permiso Contents · Read and write)</label>
    <input id="cfg-token" type="password" placeholder="github_pat_…" autocomplete="off">
    <div class="row">
      <button class="btn" id="cfg-save">Guardar configuración</button>
      <button class="btn" id="cfg-test">Probar conexión</button>
      <span class="msg" id="cfg-msg"></span>
    </div>
    <div class="note">La configuración se guarda solo en este navegador de este ordenador. El token es tu llave para publicar: no lo compartas con nadie.</div>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab tab-on" data-tab="inscripcion">Inscripción</button>
    <button class="tab" data-tab="resultados">Resultados</button>
    <button class="tab" data-tab="clasificados">Clasificados</button>
    <button class="tab" data-tab="cuadros">Cuadros</button>
    <button class="tab" data-tab="sorteo">Sorteo</button>
  </nav>

  <main>
    <section id="v-inscripcion"></section>
    <section id="v-resultados" style="display:none"></section>
    <section id="v-clasificados" style="display:none"></section>
    <section id="v-cuadros" style="display:none"></section>
    <section id="v-sorteo" style="display:none"></section>
  </main>
</div>
<div class="toast" id="toast"></div>

<script src="torneo.js"></script>
<script>
/* ══════════ ESTADO ══════════ */
var LS_STATE="burk-admin-state-v2";
var LS_CFG="burk-admin-cfg-v1";
var state=defaultState();
var dirty=false;
var activeTab="inscripcion";
var activeChip="tandas";
var confirmRegen=false;
var estParams={slot:15,inter:15};
var raffleBusy=false;
var $=function(id){return document.getElementById(id);};

try{
  var saved=localStorage.getItem(LS_STATE);
  if(saved){var p=JSON.parse(saved);if(p&&p.pairs)state=Object.assign(defaultState(),p);}
}catch(e){}
if(!state.meta.courts)state.meta.courts=5;
if(!state.raffle)state.raffle={winners:[]};

function persistLocal(){try{localStorage.setItem(LS_STATE,JSON.stringify(state));}catch(e){}}
function markDirty(){dirty=true;persistLocal();updateStatus();}
function getCfg(){
  try{var c=JSON.parse(localStorage.getItem(LS_CFG));if(c&&c.owner&&c.repo&&c.token)return c;}catch(e){}
  return null;
}
function sizes(){return state.groups?state.groups.map(function(g){return g.length;}):null;}
function courts(){return Number(state.meta.courts)||5;}
var VALID=/^\d{0,2}$/;

/* ══════════ ESTADO VISUAL / TOAST ══════════ */
var lastPublished=null;
function updateStatus(){
  var dot=$("st-dot"),txt=$("st-txt");
  if(!getCfg()){dot.style.background="#666";txt.textContent="Configura la conexión (⚙)";return;}
  if(dirty){dot.style.background="#B8933A";txt.textContent="Cambios sin publicar";}
  else if(lastPublished){dot.style.background="#3AB864";txt.textContent="Publicado a las "+lastPublished;}
  else{dot.style.background="#3AB864";txt.textContent="Conexión lista";}
}
var toastTimer=null;
function toast(msg,ms){
  var t=$("toast");t.textContent=msg;t.style.display="block";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.style.display="none";},ms||2800);
}

/* ══════════ GITHUB API ══════════ */
var b64encode=function(str){return btoa(unescape(encodeURIComponent(str)));};
var b64decode=function(b64){return decodeURIComponent(escape(atob(b64.replace(/\n/g,""))));};
var apiUrl=function(cfg){return "https://api.github.com/repos/"+cfg.owner+"/"+cfg.repo+"/contents/datos.json";};
var apiHeaders=function(cfg){return {"Authorization":"Bearer "+cfg.token,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};};

function apiGet(cfg){
  return fetch(apiUrl(cfg)+"?ref=main&_ts="+Date.now(),{headers:apiHeaders(cfg),cache:"no-store"})
    .then(function(r){
      if(r.status===404)return null;
      if(!r.ok)throw new Error("GET "+r.status);
      return r.json();
    });
}

function publish(){
  var cfg=getCfg();
  if(!cfg){toast("Antes configura usuario, repositorio y token (botón ⚙).");showCfg(true);return;}
  var btn=$("btn-pub");
  btn.disabled=true;btn.textContent="Publicando…";
  state.meta.updatedAt=new Date().toISOString();
  var body=JSON.stringify(state,null,2);
  var doPut=function(sha){
    return fetch(apiUrl(cfg),{
      method:"PUT",headers:apiHeaders(cfg),
      body:JSON.stringify(Object.assign({message:"Actualización del torneo",content:b64encode(body)},sha?{sha:sha}:{}))
    });
  };
  apiGet(cfg).catch(function(){return null;})
    .then(function(cur){return doPut(cur?cur.sha:null);})
    .then(function(r){
      if(r.status===409){
        return apiGet(cfg).then(function(cur){return doPut(cur?cur.sha:null);});
      }
      return r;
    })
    .then(function(r){
      if(r.status===401||r.status===403)throw new Error("token");
      if(!r.ok)throw new Error("PUT "+r.status);
      dirty=false;
      lastPublished=new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
      updateStatus();
      toast("✓ Publicado. Visible en la página pública en menos de 1 minuto.");
    })
    .catch(function(e){
      if(String(e.message)==="token"){
        toast("Error de permisos: revisa que el token sea válido y tenga permiso Contents · Read and write.");
      }else{
        toast("No se ha podido publicar ("+e.message+"). Revisa usuario/repositorio en ⚙ y tu conexión.");
      }
    })
    .then(function(){btn.disabled=false;btn.textContent="Guardar y publicar";});
}

function loadPublished(){
  if(dirty&&!confirm("Tienes cambios sin publicar en este ordenador. Si cargas la versión publicada, se sustituirán. ¿Continuar?"))return;
  var cfg=getCfg();
  var getData=cfg
    ? apiGet(cfg).then(function(cur){return cur?JSON.parse(b64decode(cur.content)):null;})
    : Promise.resolve(null);
  getData
    .then(function(data){
      if(data)return data;
      return fetch("datos.json?ts="+Date.now(),{cache:"no-store"}).then(function(r){
        if(!r.ok)throw new Error(r.status);return r.json();
      });
    })
    .then(function(data){
      if(!data||!data.pairs)throw new Error("Los datos publicados son de la versión antigua o no tienen el formato esperado");
      state=Object.assign(defaultState(),data);
      if(!state.meta.courts)state.meta.courts=5;
      if(!state.raffle)state.raffle={winners:[]};
      dirty=false;persistLocal();updateStatus();render();
      toast("✓ Datos publicados cargados.");
    })
    .catch(function(e){toast("No se han podido cargar los datos publicados ("+e.message+").");});
}

/* ══════════ MUTACIONES ══════════ */
var pairSeq=0;
function newPairId(){
  pairSeq++;
  var base="p"+Date.now().toString(36)+pairSeq;
  return base;
}
function clearCompetition(){
  state.groups=null;state.results={};state.bracket=null;
}
function guardEditPairs(){
  // añadir/quitar parejas tras el sorteo obliga a rehacer grupos
  if(!state.groups)return true;
  var hasResults=Object.keys(state.results).length>0||state.bracket;
  var msg=hasResults
    ? "Los grupos ya están sorteados y hay resultados. Cambiar la inscripción BORRARÁ grupos, resultados y cuadros. ¿Continuar?"
    : "Los grupos ya están sorteados. Cambiar la inscripción los borrará y habrá que volver a sortear. ¿Continuar?";
  if(!confirm(msg))return false;
  clearCompetition();
  return true;
}
function setResult(key,field,value){
  if(value!==""&&!VALID.test(value))return false;
  var cur=state.results[key]||{s1:"",s2:""};
  var nx={s1:cur.s1,s2:cur.s2};nx[field]=value;
  state.results[key]=nx;
  markDirty();return true;
}
function setBracketScore(draw,round,idx,field,value,aId,bId){
  if(value!==""&&!VALID.test(value))return false;
  var m=state.bracket[draw][round][idx];
  m[field]=value;m.aId=aId;m.bId=bId;
  markDirty();return true;
}
function doDrawGroups(){
  var P=state.pairs.length;
  var incomplete=state.pairs.filter(function(p){return !(p.p1||"").trim()||!(p.p2||"").trim();}).length;
  if(P<10){toast("Hacen falta al menos 10 parejas para formar grupos (hay "+P+").");return;}
  if(incomplete&&!confirm(incomplete+" pareja(s) tienen jugadores sin nombre. ¿Sortear igualmente?"))return;
  if(state.groups){
    var hasResults=Object.keys(state.results).length>0||state.bracket;
    var msg=hasResults
      ? "Ya hay resultados anotados. Volver a sortear BORRARÁ grupos, resultados y cuadros. ¿Seguro?"
      : "¿Rehacer el sorteo de grupos?";
    if(!confirm(msg))return;
  }
  clearCompetition();
  state.groups=drawGroups(state);
  markDirty();
  activeTab="resultados";activeChip="tandas";syncTabs();render();
  var f=computeFormat(P);
  toast("Grupos sorteados: "+f.sizes.join(" + ")+" parejas. Recuerda Guardar y publicar.");
}
function generateBrackets(){
  var q=computeQualification(state);
  state.bracket=makeBracket(q);
  confirmRegen=false;
  markDirty();
  activeTab="cuadros";syncTabs();render();
  toast("Cuadros generados. Recuerda: Guardar y publicar.");
}

/* ══════════ RENDER: INSCRIPCIÓN ══════════ */
function renderInscripcion(){
  var el=$("v-inscripcion");
  var players=state.pairs.reduce(function(n,p){return n+((p.p1||"").trim()?1:0)+((p.p2||"").trim()?1:0);},0);
  var fmt=computeFormat(state.pairs.length);
  var h='<div class="panel"><div class="panel-head">Datos del torneo</div><div class="meta-row">'
    +'<div style="flex:2;min-width:220px"><label>Título (se muestra en la página pública)</label><input id="in-title" value="'+escHtml(state.meta.title||"")+'" style="width:100%"></div>'
    +'<div><label>Pistas disponibles</label><input id="in-courts" value="'+escHtml(state.meta.courts)+'" inputmode="numeric" style="width:90px"></div>'
    +'</div></div>';

  h+='<div class="panel"><div class="panel-head">Parejas inscritas'
    +'<span class="rest">'+state.pairs.length+' parejas · '+players+' jugadores'
    +(fmt?' · formato: '+fmt.sizes.join(" + "):state.pairs.length?' · mínimo 10 parejas':'')+'</span></div>';
  if(!state.pairs.length){
    h+='<div class="empty">Añade la primera pareja para empezar.</div>';
  }else{
    state.pairs.forEach(function(p,i){
      h+='<div class="pair-row"><span class="pair-num">'+(i+1)+'</span>'
        +'<input data-pid="'+p.id+'" data-f="p1" value="'+escHtml(p.p1||"")+'" placeholder="Jugador/a 1">'
        +'<input data-pid="'+p.id+'" data-f="p2" value="'+escHtml(p.p2||"")+'" placeholder="Jugador/a 2">'
        +'<button class="pair-del" data-del="'+p.id+'" title="Eliminar pareja">✕</button></div>';
    });
  }
  h+='<div class="gen-box" style="padding-top:16px">'
    +'<button class="btn" id="btn-add-pair">+ Añadir pareja</button> '
    +'<button class="btn-gold btn" id="btn-draw" style="margin-left:8px">'+(state.groups?"Volver a sortear grupos":"Sortear grupos")+'</button>';
  if(state.groups){
    h+='<div class="hint" style="text-align:center">Grupos actuales: '
      +state.groups.map(function(g,i){return GROUP_LETTERS[i]+" ("+g.length+")";}).join(" · ")
      +'. El sorteo reparte las parejas al azar.</div>';
  }
  h+='</div></div>';

  // estimador
  var e=fmt?estimateTournament(state.pairs.length,courts(),estParams.slot,estParams.inter):null;
  h+='<div class="panel"><div class="panel-head">⏱ Estimador de duración <span class="rest">solo información interna, no se publica</span></div>'
    +'<div class="meta-row">'
    +'<div><label>Pistas</label><input id="est-courts" value="'+escHtml(courts())+'" inputmode="numeric" style="width:80px"></div>'
    +'<div><label>Min. por tanda (partido + cambio)</label><input id="est-slot" value="'+estParams.slot+'" inputmode="numeric" style="width:80px"></div>'
    +'<div><label>Min. entre grupos y cuadros</label><input id="est-inter" value="'+estParams.inter+'" inputmode="numeric" style="width:80px"></div>'
    +'</div>'
    +'<div class="tbl-wrap"><table class="est-tbl"><thead><tr><th>Parejas</th><th>Grupos</th><th>Partidos/pareja</th><th>Partidos totales</th><th>Tandas</th><th>Duración estimada</th></tr></thead><tbody id="est-body"></tbody></table></div>'
    +'<div class="hint">Base: partidos a 11 puntos (dif. 2) ≈ 12 min de juego + cambio de pista ≈ 15 min por tanda. Tandas = rondas de partidos simultáneos en todas las pistas, calculadas con el mismo planificador que ordena el horario real. La duración incluye el descanso entre la fase de grupos y los cuadros. No incluye la pausa para sorteos o comida: añádela aparte.</div>'
    +'</div>';

  el.innerHTML=h;
  fillEstTable();

  $("in-title").addEventListener("input",function(e){state.meta.title=e.target.value;markDirty();});
  $("in-courts").addEventListener("input",function(e){
    var v=e.target.value.replace(/\D/g,"").slice(0,2);
    e.target.value=v;
    if(v&&Number(v)>=1){state.meta.courts=Number(v);markDirty();fillEstTable();var ec=$("est-courts");if(ec)ec.value=v;}
  });
  el.querySelectorAll(".pair-row input").forEach(function(inp){
    inp.addEventListener("input",function(e){
      var p=pairById(state,e.target.dataset.pid);
      if(p){p[e.target.dataset.f]=e.target.value;markDirty();
        // actualizar contador sin rerender
      }
    });
  });
  el.querySelectorAll(".pair-del").forEach(function(b){
    b.addEventListener("click",function(e){
      var id=e.target.dataset.del;
      var p=pairById(state,id);
      if(!confirm("¿Eliminar la pareja "+pairName(p)+"?"))return;
      if(!guardEditPairs())return;
      state.pairs=state.pairs.filter(function(x){return x.id!==id;});
      markDirty();render();
    });
  });
  $("btn-add-pair").addEventListener("click",function(){
    if(!guardEditPairs())return;
    state.pairs.push({id:newPairId(),p1:"",p2:""});
    markDirty();render();
    var rows=el.querySelectorAll(".pair-row input");
    if(rows.length)rows[rows.length-2].focus();
  });
  $("btn-draw").addEventListener("click",doDrawGroups);
  $("est-courts").addEventListener("input",function(e){
    var v=e.target.value.replace(/\D/g,"").slice(0,2);e.target.value=v;
    if(v&&Number(v)>=1){state.meta.courts=Number(v);markDirty();var ic=$("in-courts");if(ic)ic.value=v;fillEstTable();}
  });
  $("est-slot").addEventListener("input",function(e){
    var v=e.target.value.replace(/\D/g,"").slice(0,3);e.target.value=v;
    if(v&&Number(v)>=1){estParams.slot=Number(v);fillEstTable();}
  });
  $("est-inter").addEventListener("input",function(e){
    var v=e.target.value.replace(/\D/g,"").slice(0,3);e.target.value=v;
    if(v!==""){estParams.inter=Number(v);fillEstTable();}
  });
}

function fillEstTable(){
  var body=$("est-body");if(!body)return;
  var cur=state.pairs.length;
  var h="";
  for(var P=10;P<=25;P++){
    var e=estimateTournament(P,courts(),estParams.slot,estParams.inter);
    if(!e)continue;
    h+='<tr'+(P===cur?' class="est-now"':'')+'><td>'+P+(P===cur?' ◀ actual':'')+'</td><td>'+e.sizes.join(" + ")+'</td><td>'
      +(e.minPerPair===e.maxPerPair?e.minPerPair:e.minPerPair+"–"+e.maxPerPair)+'</td><td>'+e.totalMatches+'</td><td>'
      +e.groupTandas+' + '+e.koTandas+'</td><td>'+fmtDuration(e.minutes)+'</td></tr>';
  }
  body.innerHTML=h;
}

/* ══════════ RENDER: RESULTADOS ══════════ */
function standingsTableHTML(g,q){
  var zm=zoneMap(q);
  var ZONE={main:{c:"#B8933A",l:"PRINCIPAL"},cons:{c:"#9BA3AE",l:"CONSOLACIÓN"},out:{c:"transparent",l:""}};
  var h='<div class="tbl-wrap"><table class="tbl"><thead><tr><th></th><th style="text-align:left">Pareja</th><th>PJ</th><th>PG</th><th>PP</th><th>PF</th><th>PC</th><th>DIF</th></tr></thead><tbody>';
  q.standings[g].forEach(function(t,pos){
    var z=ZONE[zm[t.id]||"out"];
    h+='<tr><td><span class="pos" style="border-left:3px solid '+z.c+'">'+(pos+1)+'</span></td>'
      +'<td><div class="team-name">'+escHtml(t.name)+'</div>'+(z.l?'<div class="zone" style="color:'+z.c+'">'+z.l+'</div>':'')+'</td>'
      +'<td>'+t.pj+'</td><td class="num-strong">'+t.w+'</td><td>'+t.l+'</td><td>'+t.pf+'</td><td>'+t.pc+'</td><td class="num-strong">'+fmtDiff(t.diff)+'</td></tr>';
  });
  return h+'</tbody></table></div>';
}

function matchRowHTML(mm,withCourt){
  var grp=state.groups[mm.g];
  var pa=pairName(pairById(state,grp[mm.i])),pb=pairName(pairById(state,grp[mm.j]));
  var res=state.results[mm.key]||{s1:"",s2:""};
  var done=isPlayed(res);
  var aWin=done&&Number(res.s1)>Number(res.s2);
  return '<div class="match" data-key="'+mm.key+'">'
    +(withCourt?'<span class="pista-chip">PISTA '+mm.court+'</span><span class="g-chip">Grupo '+GROUP_LETTERS[mm.g]+' · J'+(mm.r+1)+'</span>':'')
    +'<span class="m-team ta'+(done&&aWin?' m-win':'')+'">'+escHtml(pa)+'</span>'
    +'<input class="score-in" data-key="'+mm.key+'" data-f="s1" value="'+escHtml(res.s1)+'" inputmode="numeric" placeholder="–">'
    +'<span class="m-dash">·</span>'
    +'<input class="score-in" data-key="'+mm.key+'" data-f="s2" value="'+escHtml(res.s2)+'" inputmode="numeric" placeholder="–">'
    +'<span class="m-team m-right tb'+(done&&!aWin?' m-win':'')+'">'+escHtml(pb)+'</span></div>';
}

function refreshMatchRow(rowEl,key){
  var res=state.results[key]||{s1:"",s2:""};
  var done=isPlayed(res);
  var aWin=done&&Number(res.s1)>Number(res.s2);
  rowEl.querySelector(".ta").classList.toggle("m-win",done&&aWin);
  rowEl.querySelector(".tb").classList.toggle("m-win",done&&!aWin);
}

function bindScoreInputs(container,onAfter){
  container.querySelectorAll(".score-in[data-key]").forEach(function(inp){
    inp.addEventListener("input",function(e){
      var key=e.target.dataset.key,f=e.target.dataset.f;
      var prev=(state.results[key]||{s1:"",s2:""})[f];
      if(!setResult(key,f,e.target.value)){e.target.value=prev;return;}
      refreshMatchRow(e.target.closest(".match"),key);
      if(onAfter)onAfter();
    });
  });
}

function renderResultados(){
  var el=$("v-resultados");
  if(!state.groups){
    el.innerHTML='<div class="panel"><div class="empty">Primero sortea los grupos en la pestaña Inscripción.</div></div>';
    return;
  }
  var chips='<div class="chips"><button class="chip'+(activeChip==="tandas"?' chip-on':'')+'" data-chip="tandas" style="font-size:12px;font-family:Archivo;font-weight:700">POR TANDAS</button>';
  state.groups.forEach(function(_,g){
    chips+='<button class="chip'+(activeChip===String(g)?' chip-on':'')+'" data-chip="'+g+'">'+GROUP_LETTERS[g]+'</button>';
  });
  chips+='</div>';
  var h=chips;

  if(activeChip==="tandas"){
    var tandas=buildTandas(sizes(),courts());
    tandas.forEach(function(t,ti){
      var played=t.filter(function(mm){return isPlayed(state.results[mm.key]);}).length;
      h+='<div class="panel"><div class="panel-head">Tanda '+(ti+1)+'<span class="rest" data-tcount="'+ti+'">'+played+' / '+t.length+' partidos</span></div>';
      t.forEach(function(mm){h+=matchRowHTML(mm,true);});
      h+='</div>';
    });
    el.innerHTML=h;
    bindScoreInputs(el,function(){
      tandas.forEach(function(t,ti){
        var played=t.filter(function(mm){return isPlayed(state.results[mm.key]);}).length;
        var s=el.querySelector('[data-tcount="'+ti+'"]');
        if(s)s.textContent=played+" / "+t.length+" partidos";
      });
    });
  }else{
    var g=Number(activeChip);
    var q=computeQualification(state);
    var n=state.groups[g].length;
    h+='<div class="panel"><div class="panel-head">Clasificación · Grupo '+GROUP_LETTERS[g]+'<span class="rest">'+n+' parejas</span></div><div id="standings-box">'+standingsTableHTML(g,q)+'</div></div>';
    scheduleFor(n).forEach(function(round,r){
      h+='<div class="panel"><div class="panel-head">Jornada '+(r+1);
      if(round.rest!=null)h+='<span class="rest">descansa '+escHtml(pairName(pairById(state,state.groups[g][round.rest])))+'</span>';
      h+='</div>';
      round.pairs.forEach(function(pr,m){
        h+=matchRowHTML({g:g,r:r,m:m,i:pr[0],j:pr[1],key:g+"-"+r+"-"+m},false);
      });
      h+='</div>';
    });
    el.innerHTML=h;
    bindScoreInputs(el,function(){
      var q2=computeQualification(state);
      var box=el.querySelector("#standings-box");
      if(box)box.innerHTML=standingsTableHTML(g,q2);
    });
  }
  el.querySelectorAll(".chip").forEach(function(c){
    c.addEventListener("click",function(){activeChip=c.dataset.chip;renderResultados();});
  });
}

/* ══════════ RENDER: CLASIFICADOS ══════════ */
function posLabel(t){
  return (t.pos+1)+"º grupo "+t.letter;
}
function renderClasificados(){
  var el=$("v-clasificados");
  if(!state.groups){
    el.innerHTML='<div class="panel"><div class="empty">Primero sortea los grupos en la pestaña Inscripción.</div></div>';
    return;
  }
  var q=computeQualification(state);
  var totalM=groupMatchList(state).length;
  var played=playedCount(state);
  var h='<div class="panel"><div class="panel-head gold">Cuadro principal · 8 parejas</div>';
  q.main.forEach(function(t,i){
    h+='<div class="qual-row"><span class="seed">'+(i+1)+'</span><span class="q-name">'+escHtml(t.name)
      +'</span><span class="q-meta">'+posLabel(t)+' · '+t.w+'V-'+t.l+'D · '+fmtDiff(t.diff)+'</span></div>';
  });
  h+='</div><div class="panel"><div class="panel-head silver">Consolación · '+q.cons.length+' parejas'
    +(q.cons.length<8?'<span class="rest">'+(8-q.cons.length)+' pase(s) directo(s) para los mejores</span>':'')+'</div>';
  q.cons.forEach(function(t,i){
    h+='<div class="qual-row"><span class="seed seed-s">'+(i+1)+'</span><span class="q-name">'+escHtml(t.name)
      +'</span><span class="q-meta">'+posLabel(t)+' · '+t.w+'V-'+t.l+'D · '+fmtDiff(t.diff)+'</span></div>';
  });
  h+='<div class="hint">Criterio: posición en el grupo; entre grupos, % de victorias → diferencia media de puntos → puntos a favor. Dentro de cada grupo, el empate a victorias se resuelve por el enfrentamiento directo.</div></div>';

  h+='<div class="gen-box"><div class="progress-line"><div class="progress-bar" style="width:'+(totalM?played/totalM*100:0)+'%"></div></div>'
    +'<div class="progress-txt">'+played+' / '+totalM+' partidos de grupo</div>';
  if(!state.bracket){
    h+='<button class="btn-gold btn" id="btn-gen">Generar cuadros</button>';
  }else if(confirmRegen){
    h+='<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
      +'<button class="btn btn-danger" id="btn-gen-yes">Sí, regenerar y borrar resultados de cuadros</button>'
      +'<button class="btn" id="btn-gen-no">Cancelar</button></div>';
  }else{
    h+='<button class="btn-gold btn" id="btn-gen-ask">Regenerar cuadros</button>'
      +'<div class="hint" style="text-align:center">Regenerar recalcula los emparejamientos y borra los resultados ya anotados en los cuadros.</div>';
  }
  if(played<totalM)h+='<div class="hint" style="text-align:center">Puedes generarlos ya, pero la clasificación cambiará si faltan resultados.</div>';
  h+='</div>';
  el.innerHTML=h;
  var gen=$("btn-gen");if(gen)gen.addEventListener("click",generateBrackets);
  var ask=$("btn-gen-ask");if(ask)ask.addEventListener("click",function(){confirmRegen=true;renderClasificados();});
  var yes=$("btn-gen-yes");if(yes)yes.addEventListener("click",generateBrackets);
  var no=$("btn-gen-no");if(no)no.addEventListener("click",function(){confirmRegen=false;renderClasificados();});
}

/* ══════════ RENDER: CUADROS ══════════ */
function bkMatchEditHTML(draw,round,idx,a,b,label){
  var m=state.bracket[draw][round][idx];
  var bye=(a&&!b)||(!a&&b);
  var valid=a&&b&&m.aId===a.id&&m.bId===b.id;
  var s1=valid?m.s1:"",s2=valid?m.s2:"";
  var w=bye?(a||b):((a&&b)?winnerOf({s1:s1,s2:s2,aId:m.aId,bId:m.bId},a,b):null);
  var dis=(!a||!b)?" disabled":"";
  var row=function(t,v,f){
    var name=t?escHtml(t.name):(bye?'<span class="bk-bye">— pase directo —</span>':'Por definir');
    return '<div class="bk-row'+(w&&t&&w.id===t.id?' bk-win':'')+'">'
      +'<span class="bk-name">'+name+'</span>'
      +'<input class="score-in bk-in" data-draw="'+draw+'" data-round="'+round+'" data-idx="'+idx+'" data-f="'+f+'"'
      +' data-aid="'+(a?a.id:'')+'" data-bid="'+(b?b.id:'')+'" value="'+escHtml(v)+'" inputmode="numeric" placeholder="–"'+dis+'></div>';
  };
  return '<div class="bk-match"><div class="bk-label">'+label+'</div>'+row(a,s1,"s1")+row(b,s2,"s2")+'</div>';
}

function renderCuadros(){
  var el=$("v-cuadros");
  if(!state.bracket){
    el.innerHTML='<div class="panel"><div class="empty"><div style="margin-bottom:16px">Los cuadros se generan desde la pestaña Clasificados.</div>'
      +(state.groups?'<button class="btn-gold btn" id="btn-gen2">Generar cuadros ahora</button>':'')+'</div></div>';
    var g2=$("btn-gen2");if(g2)g2.addEventListener("click",generateBrackets);
    return;
  }
  var draw=function(d,title,accent,headClass){
    var br=state.bracket[d];
    var dd=bracketDerived(br);
    var h='<div class="panel"><div class="panel-head '+headClass+'">'+title+'</div><div class="bk-cols">';
    h+='<div class="bk-col"><div class="bk-round">Cuartos</div>'+br.qf.map(function(m,i){return bkMatchEditHTML(d,"qf",i,m.a,m.b,"QF"+(i+1));}).join('')+'</div>';
    h+='<div class="bk-col"><div class="bk-round">Semifinales</div>'+dd.sfPairs.map(function(p,i){return bkMatchEditHTML(d,"sf",i,p[0],p[1],"SF"+(i+1));}).join('')+'</div>';
    h+='<div class="bk-col"><div class="bk-round">Final</div>'+bkMatchEditHTML(d,"f",0,dd.sfW[0],dd.sfW[1],"FINAL");
    if(dd.champ)h+='<div class="champ-card" style="border-color:'+accent+'"><div class="k">Campeón</div><div class="n" style="color:'+accent+'">'+escHtml(dd.champ.name)+'</div></div>';
    h+='</div></div></div>';
    return h;
  };
  el.innerHTML=draw("main","Cuadro principal","#B8933A","gold")+draw("cons","Consolación","#9BA3AE","silver")
    +'<div class="hint" style="text-align:center">Los ganadores (y los pases directos) avanzan solos a la siguiente ronda al terminar de escribir el marcador.</div>';
  el.querySelectorAll(".bk-in").forEach(function(inp){
    inp.addEventListener("input",function(e){
      var d=e.target.dataset;
      var cur=state.bracket[d.draw][d.round][Number(d.idx)][d.f];
      if(!setBracketScore(d.draw,d.round,Number(d.idx),d.f,e.target.value,d.aid||null,d.bid||null)){
        e.target.value=cur;
      }
    });
    inp.addEventListener("change",function(){renderCuadros();});
  });
}

/* ══════════ RENDER: SORTEO ══════════ */
function renderSorteo(){
  var el=$("v-sorteo");
  var pool=rafflePool(state);
  var winners=state.raffle.winners;
  var totalPlayers=state.pairs.reduce(function(n,p){return n+((p.p1||"").trim()?1:0)+((p.p2||"").trim()?1:0);},0);
  var h='<div class="panel"><div class="panel-head gold">Sorteo entre jugadores'
    +'<span class="rest">'+pool.length+' participan · '+winners.length+' ya premiados · '+totalPlayers+' jugadores en total</span></div>'
    +'<div class="meta-row"><div style="flex:1;min-width:220px"><label>Premio que se sortea</label>'
    +'<input id="raffle-prize" placeholder="p. ej. Pala BÜRK, Televisión…" style="width:100%"></div></div>'
    +'<div class="raffle-stage">'
    +'<div class="raffle-display" id="raffle-display">'+(pool.length?'¿Quién ganará?':'—')+'</div>'
    +'<div class="raffle-prize-line" id="raffle-prize-line"></div>'
    +'<div style="margin-top:18px"><button class="btn-gold btn" id="btn-raffle"'+(pool.length?'':' disabled')+'>🎁 Sortear</button></div>'
    +(pool.length?'':'<div class="hint" style="text-align:center">'+(totalPlayers?'Todos los jugadores ya han sido premiados. Reinicia los sorteos para volver a empezar.':'Inscribe parejas para poder sortear.')+'</div>')
    +'</div>'
    +'<div class="hint">El sorteo elige al azar entre todos los jugadores inscritos (2 por pareja). Quien ya ha ganado un premio no puede volver a salir. Publica después de cada sorteo para que el ganador aparezca en la página pública.</div>'
    +'</div>';

  h+='<div class="panel"><div class="panel-head">Ganadores del día</div>';
  if(!winners.length){
    h+='<div class="empty">Aún no hay ganadores.</div>';
  }else{
    winners.forEach(function(w,i){
      var t=w.at?new Date(w.at).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}):"";
      h+='<div class="raffle-row"><span>🎁</span><span class="raffle-name">'+escHtml(w.name)
        +(w.prize?'<div class="raffle-prize">'+escHtml(w.prize)+'</div>':'')+'</span>'
        +'<span class="raffle-time">'+t+'</span>'
        +'<button class="pair-del" data-delw="'+i+'" title="Anular este premio">✕</button></div>';
    });
    h+='<div class="gen-box"><button class="btn btn-danger" id="btn-raffle-reset">Reiniciar sorteos (borrar ganadores)</button></div>';
  }
  h+='</div>';
  el.innerHTML=h;

  var btn=$("btn-raffle");
  if(btn)btn.addEventListener("click",runRaffle);
  el.querySelectorAll("[data-delw]").forEach(function(b){
    b.addEventListener("click",function(e){
      var i=Number(e.target.dataset.delw);
      var w=state.raffle.winners[i];
      if(!confirm("¿Anular el premio de "+w.name+"? Volverá a poder ganar en próximos sorteos."))return;
      state.raffle.winners.splice(i,1);
      markDirty();renderSorteo();
    });
  });
  var rst=$("btn-raffle-reset");
  if(rst)rst.addEventListener("click",function(){
    if(!confirm("¿Borrar TODOS los ganadores? Todos los jugadores volverán a participar."))return;
    state.raffle.winners=[];
    markDirty();renderSorteo();
  });
}

function runRaffle(){
  if(raffleBusy)return;
  var pool=rafflePool(state);
  if(!pool.length){toast("No quedan jugadores sin premio.");return;}
  var prize=($("raffle-prize").value||"").trim();
  var display=$("raffle-display");
  var prizeLine=$("raffle-prize-line");
  var btn=$("btn-raffle");
  raffleBusy=true;btn.disabled=true;
  display.classList.remove("win");
  prizeLine.textContent=prize?("Sorteo: "+prize):"";
  var ticks=0;
  var iv=setInterval(function(){
    display.textContent=pool[Math.floor(Math.random()*pool.length)];
    ticks++;
  },70);
  setTimeout(function(){
    clearInterval(iv);
    var winner=pool[Math.floor(Math.random()*pool.length)];
    display.textContent=winner;
    display.classList.add("win");
    prizeLine.textContent=prize?("🏆 Gana: "+prize):"🏆 ¡Enhorabuena!";
    state.raffle.winners.push({name:winner,prize:prize,at:new Date().toISOString()});
    markDirty();
    raffleBusy=false;
    // re-render solo la lista de ganadores manteniendo el display
    setTimeout(function(){
      renderSorteo();
      var d=$("raffle-display"),pl=$("raffle-prize-line");
      d.textContent=winner;d.classList.add("win");
      pl.textContent=prize?("🏆 Gana: "+prize):"🏆 ¡Enhorabuena!";
      $("raffle-prize").value=prize;
      toast("✓ "+winner+" añadido a ganadores. Recuerda Guardar y publicar.");
    },400);
  },2400);
}

/* ══════════ TABS / RENDER GLOBAL ══════════ */
function render(){
  if(activeTab==="inscripcion")renderInscripcion();
  if(activeTab==="resultados")renderResultados();
  if(activeTab==="clasificados")renderClasificados();
  if(activeTab==="cuadros")renderCuadros();
  if(activeTab==="sorteo")renderSorteo();
  ["inscripcion","resultados","clasificados","cuadros","sorteo"].forEach(function(k){
    $("v-"+k).style.display=k===activeTab?"":"none";
  });
}
function syncTabs(){
  document.querySelectorAll("#tabs .tab").forEach(function(t){t.classList.toggle("tab-on",t.dataset.tab===activeTab);});
}
$("tabs").addEventListener("click",function(e){
  var b=e.target.closest(".tab");if(!b)return;
  activeTab=b.dataset.tab;confirmRegen=false;syncTabs();render();
});

/* ══════════ RESUMEN PARA WHATSAPP ══════════ */
function buildSummary(){
  var out="🏓 "+(state.meta.title||"TORNEO")+"\n";
  if(!state.groups){
    out+="Inscripción: "+state.pairs.length+" parejas\n";
    state.pairs.forEach(function(p,i){out+=(i+1)+". "+pairName(p)+"\n";});
  }else{
    var q=computeQualification(state);
    out+=playedCount(state)+"/"+groupMatchList(state).length+" partidos de grupo jugados\n";
    state.groups.forEach(function(_,g){
      out+="\nGRUPO "+GROUP_LETTERS[g]+"\n";
      q.standings[g].forEach(function(t,i){
        out+=(i+1)+". "+t.name+" · "+t.w+"V-"+t.l+"D ("+fmtDiff(t.diff)+")\n";
      });
    });
    if(state.bracket){
      var part=function(d,title){
        var br=state.bracket[d];
        var dd=bracketDerived(br);
        var o="\n"+title+"\n";var any=false;
        br.qf.forEach(function(m,i){
          if(m.a&&m.b&&m.aId===m.a.id&&m.bId===m.b.id&&m.s1!==""&&m.s2!==""){
            o+="Cuartos "+(i+1)+": "+m.a.name+" "+m.s1+"-"+m.s2+" "+m.b.name+"\n";any=true;
          }else if((m.a&&!m.b)||(!m.a&&m.b)){
            o+="Cuartos "+(i+1)+": "+(m.a||m.b).name+" — pase directo\n";any=true;
          }
        });
        dd.sfPairs.forEach(function(p,i){
          var m=br.sf[i];
          if(p[0]&&p[1]&&m.aId===p[0].id&&m.bId===p[1].id&&m.s1!==""&&m.s2!==""){
            o+="Semifinal "+(i+1)+": "+p[0].name+" "+m.s1+"-"+m.s2+" "+p[1].name+"\n";any=true;
          }
        });
        var f=br.f[0];
        if(dd.sfW[0]&&dd.sfW[1]&&f.aId===dd.sfW[0].id&&f.bId===dd.sfW[1].id&&f.s1!==""&&f.s2!==""){
          o+="FINAL: "+dd.sfW[0].name+" "+f.s1+"-"+f.s2+" "+dd.sfW[1].name+"\n";any=true;
        }
        if(dd.champ)o+="🏆 Campeón: "+dd.champ.name+"\n";
        return (any||dd.champ)?o:"";
      };
      out+=part("main","CUADRO PRINCIPAL")+part("cons","CONSOLACIÓN");
    }
  }
  if(state.raffle.winners.length){
    out+="\nSORTEOS\n";
    state.raffle.winners.forEach(function(w){
      out+="🎁 "+w.name+(w.prize?" — "+w.prize:"")+"\n";
    });
  }
  return out;
}
$("btn-copy").addEventListener("click",function(){
  var text=buildSummary();
  var done=function(){toast("✓ Resumen copiado. Pégalo en WhatsApp.");};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){fallbackCopy(text,done);});
  }else fallbackCopy(text,done);
});
function fallbackCopy(text,done){
  try{
    var ta=document.createElement("textarea");ta.value=text;
    ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();
    document.execCommand("copy");document.body.removeChild(ta);
    done();
  }catch(e){toast("No se ha podido copiar automáticamente.");}
}

/* ══════════ CONFIGURACIÓN ══════════ */
function showCfg(show){$("cfg").style.display=show?"":"none";}
$("btn-cfg").addEventListener("click",function(){
  var c=getCfg()||{};
  $("cfg-owner").value=c.owner||"";
  $("cfg-repo").value=c.repo||"burk-torneo";
  $("cfg-token").value=c.token||"";
  showCfg($("cfg").style.display==="none");
});
$("cfg-save").addEventListener("click",function(){
  var owner=$("cfg-owner").value.trim(),repo=$("cfg-repo").value.trim(),token=$("cfg-token").value.trim();
  var msg=$("cfg-msg");
  if(!owner||!repo||!token){msg.className="msg bad";msg.textContent="Faltan campos.";return;}
  localStorage.setItem(LS_CFG,JSON.stringify({owner:owner,repo:repo,token:token}));
  msg.className="msg ok";msg.textContent="✓ Guardada en este navegador.";
  updateStatus();
});
$("cfg-test").addEventListener("click",function(){
  var msg=$("cfg-msg");
  var owner=$("cfg-owner").value.trim(),repo=$("cfg-repo").value.trim(),token=$("cfg-token").value.trim();
  if(!owner||!repo||!token){msg.className="msg bad";msg.textContent="Rellena los tres campos antes de probar.";return;}
  msg.className="msg";msg.textContent="Probando…";
  fetch("https://api.github.com/repos/"+owner+"/"+repo,{headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github+json"}})
    .then(function(r){
      if(r.status===401){msg.className="msg bad";msg.textContent="Token no válido o caducado.";return;}
      if(r.status===404){msg.className="msg bad";msg.textContent="No se encuentra el repositorio: revisa usuario y nombre.";return;}
      if(!r.ok){msg.className="msg bad";msg.textContent="Error "+r.status+".";return;}
      msg.className="msg ok";msg.textContent="✓ Conexión correcta con "+owner+"/"+repo+".";
    })
    .catch(function(){msg.className="msg bad";msg.textContent="Sin conexión a internet o bloqueado por el navegador.";});
});

/* ══════════ ARRANQUE ══════════ */
$("btn-pub").addEventListener("click",publish);
$("btn-load").addEventListener("click",loadPublished);
updateStatus();
if(!getCfg())showCfg(true);
render();
</script>
