name: Corregir carga inicial de cuadros

# Segunda actualización para activar el workflow ya registrado en main.
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Corregir y validar rama
        shell: bash
        run: |
          git fetch origin agent/bracket-courts
          git checkout -B agent/bracket-courts origin/agent/bracket-courts
          python - <<'PY'
          from pathlib import Path
          p = Path('torneo.js')
          s = p.read_text(encoding='utf-8')
          old = '''    window.renderCuadros();
  }

  if (typeof module !== "undefined" && module.exports) {'''
          new = '''    if (window.DATA) window.renderCuadros();
  }

  if (typeof module !== "undefined" && module.exports) {'''
          if old not in s:
              raise SystemExit('No se encontró el bloque esperado')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')
          PY
          node --check torneo.js
          git config user.name "BÜRK Bot"
          git config user.email "actions@users.noreply.github.com"
          git add torneo.js
          git commit -m "Evitar render antes de cargar datos"
          git push origin HEAD:agent/bracket-courts

      - name: Eliminar workflow temporal
        shell: bash
        run: |
          git checkout main
          rm .github/workflows/fix-bracket-courts.yml
          git add .github/workflows/fix-bracket-courts.yml
          git commit -m "Eliminar workflow temporal de corrección"
          git push origin main
