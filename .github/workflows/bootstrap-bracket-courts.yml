name: Activar mejora temporal de cuadros

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar mejora en la rama de trabajo
        shell: bash
        run: |
          git fetch origin agent/bracket-courts
          git checkout -B agent/bracket-courts origin/agent/bracket-courts
          python - <<'PYBOOT'
          from pathlib import Path
          source = Path('.github/workflows/apply-bracket-courts.yml').read_text(encoding='utf-8')
          anchor = "          python - <<'PY'\n"
          start = source.index(anchor) + len(anchor)
          end = source.index("\n          PY\n", start)
          block = source[start:end]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/apply_bracket_courts.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PYBOOT
          python /tmp/apply_bracket_courts.py
          node --check torneo.js
          node - <<'NODE'
          const assert = require('assert');
          const t = require('./torneo.js');
          const team = id => ({id, name:id});
          const qf = (a,b) => ({s1:'',s2:'',aId:null,bId:null,a,b});
          const later = () => ({s1:'',s2:'',aId:null,bId:null});
          const br = {
            main:{qf:[qf(team('1'),team('8')),qf(team('4'),team('5')),qf(team('2'),team('7')),qf(team('3'),team('6'))],sf:[later(),later()],f:[later()]},
            cons:{qf:[qf(team('c1'),team('c8')),qf(team('c4'),team('c5')),qf(team('c2'),team('c7')),qf(team('c3'),team('c6'))],sf:[later(),later()],f:[later()]}
          };
          t.ensureBracketSchedule(br,5,true);
          const refs=t.bracketScheduleRefs(br);
          assert.strictEqual(refs.length,14);
          assert.deepStrictEqual(refs.slice(0,5).map(r=>[r.match.slot,r.match.court]),[[1,1],[1,2],[1,3],[1,4],[1,5]]);
          assert.deepStrictEqual(refs.filter(r=>r.round==='sf').map(r=>r.match.slot),[3,3,3,3]);
          assert.deepStrictEqual(refs.filter(r=>r.round==='f').map(r=>r.match.slot),[4,4]);
          br.main.qf[0].court=5;
          t.ensureBracketSchedule(br,5,false);
          assert.strictEqual(br.main.qf[0].court,5);
          console.log('Validación de pistas: OK');
          NODE
          rm .github/workflows/apply-bracket-courts.yml
          git config user.name "BÜRK Bot"
          git config user.email "actions@users.noreply.github.com"
          git add torneo.js .github/workflows/apply-bracket-courts.yml
          git commit -m "Añadir pistas y tandas a los cuadros"
          git push origin HEAD:agent/bracket-courts

      - name: Eliminar workflow temporal de main
        shell: bash
        run: |
          git checkout main
          rm .github/workflows/bootstrap-bracket-courts.yml
          git add .github/workflows/bootstrap-bracket-courts.yml
          git commit -m "Eliminar workflow temporal de cuadros"
          git push origin main
